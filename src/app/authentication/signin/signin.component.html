<div class="auth-container modern-auth">
  <div class="row auth-main h-100 m-0">
    <div class="col-sm-6 px-0 d-none d-sm-block left-panel-wrapper">
      <div class="abstract-bg">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
      </div>
    </div>
    <div class="col-sm-6 auth-form-section">
      <div class="auth-glass-panel">
        <div class="auth-wrapper">
          <div class="text-center mb-4">
            <h6 class="welcome-msg">Bienvenido</h6>
          </div>

          <form class="validate-form mt-4" [formGroup]="authForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-3">
                <mat-form-field class="example-full-width" appearance="outline">
                  <mat-label>Username</mat-label>
                  <input matInput formControlName="username" placeholder="Enter your username" />
                  <mat-icon class="material-icons-outlined color-icon p-3" matSuffix>person</mat-icon>
                  @if (authForm.get('username')?.hasError('required')) {
                  <mat-error>Username is required</mat-error>
                  }
                </mat-form-field>
              </div>
            </div>
            <div class="row">
              <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-3">
                <mat-form-field class="example-full-width" appearance="outline">
                  <mat-label>Password</mat-label>
                  <input matInput [type]="hide ? 'password' : 'text'" formControlName="password"
                    placeholder="Enter your password">
                  <mat-icon class="material-icons-outlined pwd-toggle p-3" matSuffix (click)="hide = !hide">
                    {{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                  @if (authForm.get('password')?.hasError('required')) {
                  <mat-error>Password is required</mat-error>
                  }
                </mat-form-field>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check custom-checkbox">
                <label class="form-check-label text-muted">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="rememberMe"
                    [ngModelOptions]="{standalone: true}"> Remember me
                  <span class="form-check-sign">
                    <span class="check"></span>
                  </span>
                </label>
              </div>
            </div>
            @if (error) {
            <div class="alert alert-danger mt-3 mb-0 rounded-alert"><i
                class="fas fa-exclamation-circle me-2"></i>{{error}}</div>
            }
            <div class="container-auth-form-btn mt-2">
              <button mat-flat-button color="primary" [class.auth-spinner]="loading"
                [disabled]="loading || !authForm.valid" class="auth-form-btn modern-btn" type="submit">
                <span>Sign In</span> <i class="fas fa-arrow-right ms-2 transition-icon"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
