<div class="auth-centered-container">
  <!-- Decorative Background Shapes -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <div class="glass-card text-center">
    <div class="error-code-wrap mb-2">
      <h1 class="error-code">404</h1>
      <div class="error-glow"></div>
    </div>

    <h3 class="error-title mb-2">Page Not Found</h3>
    <p class="error-description text-muted mb-4">
      Oops! The page you are looking for has either been moved, deleted, or never existed in the first place.
    </p>

    <div class="container-auth-form-btn mb-4">
      <button mat-flat-button color="primary" class="auth-form-btn modern-btn" routerLink="/admin/dashboard/main">
        <span>Back to Home</span> <i class="fas fa-home ms-2"></i>
      </button>
    </div>

    <div class="text-center">
      <a routerLink="/authentication/signin" class="help-link">
        Need assistance? Contact support
      </a>
    </div>
  </div>
</div>
