<div class="auth-centered-container">
  <!-- Decorative Background Shapes -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>

  <div class="glass-card">
    <div class="brand-logo mb-4">
      <img src="assets/images/logo.png" alt="Smart School Logo" class="logo-img" height="40">
    </div>

    <div class="text-center mb-4">
      <div class="icon-wrap mb-3">
        <i class="fas fa-lock-open"></i>
      </div>
      <h3 class="welcome-msg">Reset Password</h3>
      <p class="auth-signup-text text-muted">Enter your email address below to receive password reset instructions.</p>
    </div>

    <form class="validate-form" [formGroup]="authForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <mat-form-field class="example-full-width" appearance="outline">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="name@example.com" required>
          <mat-icon class="material-icons-outlined color-icon p-3" matSuffix>mail</mat-icon>
          @if (authForm.get('email')?.hasError('required') || authForm.get('email')?.touched) {
          <mat-error>Please enter a valid email address</mat-error>
          }
        </mat-form-field>
      </div>

      <div class="container-auth-form-btn mt-2 mb-4">
        <button mat-flat-button color="primary" class="auth-form-btn modern-btn" [disabled]="!authForm.valid" type="submit">
          <span>Send Reset Link</span> <i class="fas fa-paper-plane ms-2"></i>
        </button>
      </div>

      <div class="text-center">
        <a routerLink="/authentication/signin" class="back-link">
          <i class="fas fa-arrow-left me-2"></i> Back to Sign In
        </a>
      </div>
    </form>
  </div>
</div>
