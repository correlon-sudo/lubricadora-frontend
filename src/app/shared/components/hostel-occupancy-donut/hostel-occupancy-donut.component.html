<mat-card class="modern-card hostel-occupancy-card">
  <mat-card-header class="header-style z-index-1">
    <mat-card-title>
      <mat-icon class="card-title-icon material-icons-outlined">hotel</mat-icon> Hostel Occupancy Status
    </mat-card-title>
    <button mat-icon-button [matMenuTriggerFor]="menu" class="header-dropdown">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <mat-icon>refresh</mat-icon>
        <span>Refresh Stats</span>
      </button>
      <button mat-menu-item>
        <mat-icon>assignment</mat-icon>
        <span>Manage Rooms</span>
      </button>
    </mat-menu>
  </mat-card-header>

  <mat-card-content class="p-0 z-index-1 d-flex flex-column justify-content-between flex-grow-1">
    <!-- Top Donut & Progress Section -->
    <div class="row align-items-center p-3 g-0">
      <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 text-center">
        <apx-chart [series]="chartOptions.series!" [chart]="chartOptions.chart!" [labels]="chartOptions.labels!"
          [colors]="chartOptions.colors!" [dataLabels]="chartOptions.dataLabels!"
          [plotOptions]="chartOptions.plotOptions!" [legend]="chartOptions.legend!" [tooltip]="chartOptions.tooltip!"
          [responsive]="chartOptions.responsive!">
        </apx-chart>
      </div>
      <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12">
        <div class="hostel-stats-list">
          @for (block of stats; track block) {
          <div class="mb-3 pb-2 border-bottom border-light-subtle">
            <div class="d-flex justify-content-between align-items-center mb-1">
              <span class="font-13 font-weight-bold" [ngClass]="block.colorClass">{{ block.label }}</span>
              <span class="font-12 font-weight-medium text-muted">{{ block.occupied }}/{{ block.total }} Beds</span>
            </div>
            <div class="progress" style="height: 6px;">
              <div class="progress-bar" [style.width.%]="(block.occupied / block.total) * 100" [ngClass]="{
                  'bg-primary': block.colorClass === 'text-primary',
                  'bg-success': block.colorClass === 'text-success',
                  'bg-warning': block.colorClass === 'text-warning'
                }" role="progressbar">
              </div>
            </div>
          </div>
          }
        </div>
      </div>
    </div>

    <!-- Divider Line -->
    <div class="px-3">
      <hr class="section-divider my-1">
    </div>

  </mat-card-content>
</mat-card>
