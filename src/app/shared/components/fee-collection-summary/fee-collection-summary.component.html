<mat-card class="modern-card fee-summary-card shadow-sm">
  <mat-card-header class="header-menu d-flex justify-content-between align-items-center">
    <mat-card-title class="font-18 font-weight-bold">
      <mat-icon class="card-title-icon material-icons-outlined">account_balance_wallet</mat-icon>
      Fee Collection Summary
    </mat-card-title>
    <button mat-flat-button color="primary" class="rounded-pill" (click)="sendReminders()">
      <mat-icon class="font-16 align-middle me-1">notifications_active</mat-icon> Send Reminders
    </button>
  </mat-card-header>
  <mat-card-content class="pt-3">
    <div class="row align-items-center">
      <div class="col-md-6 col-sm-12">
        <div class="chart-container">
          <apx-chart 
            [series]="chartOptions.series!" 
            [chart]="chartOptions.chart!"
            [labels]="chartOptions.labels!" 
            [colors]="chartOptions.colors!"
            [legend]="chartOptions.legend!" 
            [dataLabels]="chartOptions.dataLabels!"
            [responsive]="chartOptions.responsive!">
          </apx-chart>
        </div>
      </div>
      <div class="col-md-6 col-sm-12 mt-3 mt-md-0">
        <div class="stats-breakdown">
          <div class="stat-item d-flex align-items-center justify-content-between p-2 mb-2 bg-light-green rounded">
            <div>
              <span class="text-success font-weight-bold font-13">Collected</span>
              <h5 class="mb-0 font-weight-bold text-success">${{ stats.totalCollected | number }}</h5>
            </div>
            <mat-icon class="text-success font-32">check_circle_outline</mat-icon>
          </div>
          <div class="stat-item d-flex align-items-center justify-content-between p-2 mb-2 bg-light-orange rounded">
            <div>
              <span class="text-warning font-weight-bold font-13">Pending</span>
              <h5 class="mb-0 font-weight-bold text-warning">${{ stats.totalPending | number }}</h5>
            </div>
            <mat-icon class="text-warning font-32">hourglass_empty</mat-icon>
          </div>
          <div class="stat-item d-flex align-items-center justify-content-between p-2 bg-light-red rounded">
            <div>
              <span class="text-danger font-weight-bold font-13">Overdue</span>
              <h5 class="mb-0 font-weight-bold text-danger">${{ stats.totalOverdue | number }}</h5>
            </div>
            <mat-icon class="text-danger font-32">error_outline</mat-icon>
          </div>
        </div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
