<mat-card class="modern-card library-card shadow-sm">
  <mat-card-header class="header-menu d-flex justify-content-between align-items-center">
    <mat-card-title class="font-18 font-weight-bold">
      <mat-icon class="card-title-icon material-icons-outlined">local_library</mat-icon>
      Overdue Library Resources
    </mat-card-title>
    <a mat-button color="primary" href="#" (click)="$event.preventDefault();">Library Console</a>
  </mat-card-header>
  <mat-card-content class="pt-3">
    <div class="responsive-table-container">
      <table mat-table [dataSource]="overdueBooks" class="w-100 table-responsive-md">
        
        <!-- Student Column -->
        <ng-container matColumnDef="student">
          <th mat-header-cell *matHeaderCellDef class="font-weight-600 font-13"> Student </th>
          <td mat-cell *matCellDef="let element">
            <div class="d-flex align-items-center py-2">
              <img [src]="element.avatar" alt="student" class="student-avatar rounded-circle me-2">
              <span class="font-weight-500 font-13">{{ element.studentName }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Book Title Column -->
        <ng-container matColumnDef="book">
          <th mat-header-cell *matHeaderCellDef class="font-weight-600 font-13"> Overdue Title </th>
          <td mat-cell *matCellDef="let element">
            <div class="book-info">
              <span class="font-weight-500 font-13 text-truncate block-text max-width-180" [title]="element.bookTitle">
                {{ element.bookTitle }}
              </span>
              <span class="text-muted font-11">ISBN: {{ element.isbn }}</span>
            </div>
          </td>
        </ng-container>

        <!-- Days Overdue Column -->
        <ng-container matColumnDef="days">
          <th mat-header-cell *matHeaderCellDef class="font-weight-600 font-13"> Days </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <span class="badge bg-danger-subtle text-danger font-11 py-1 px-2">
              {{ element.daysOverdue }} days
            </span>
          </td>
        </ng-container>

        <!-- Fine Amount Column -->
        <ng-container matColumnDef="fine">
          <th mat-header-cell *matHeaderCellDef class="font-weight-600 font-13"> Fine </th>
          <td mat-cell *matCellDef="let element" class="text-center font-weight-bold text-danger">
            ${{ element.fineAmount | number:'1.2-2' }}
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef class="font-weight-600 font-13 text-end"> Action </th>
          <td mat-cell *matCellDef="let element" class="text-end">
            <button mat-flat-button [color]="element.notified ? 'secondary' : 'warn'" 
              class="btn-xs rounded-pill" [disabled]="element.notified" (click)="sendNotice(element.id)">
              <mat-icon class="font-14 align-middle">
                {{ element.notified ? 'done_all' : 'mail_outline' }}
              </mat-icon> 
              {{ element.notified ? 'Notified' : 'Remind' }}
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
