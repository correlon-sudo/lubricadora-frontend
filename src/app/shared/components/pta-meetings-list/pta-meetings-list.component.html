<mat-card>
  <mat-card-header class="header-style">
    <mat-card-title>
      <i class="fas fa-handshake mr-2"></i> Upcoming PTA Meetings
    </mat-card-title>
    <button mat-icon-button [matMenuTriggerFor]="menu" class="header-dropdown">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>
        <mat-icon>refresh</mat-icon>
        <span>Refresh Schedule</span>
      </button>
      <button mat-menu-item>
        <mat-icon>add</mat-icon>
        <span>Schedule Meeting</span>
      </button>
    </mat-menu>
  </mat-card-header>
  <mat-card-content class="p-3">
    <div class="pta-list">
      @for (meeting of meetings; track meeting.id) {
      <div class="pta-item p-3 mb-3 d-flex align-items-center justify-content-between" [ngClass]="getPriorityBorderClass(meeting.priority)">
        <div class="d-flex align-items-center">
          <img [src]="meeting.parentImg" alt="Parent Avatar" class="rounded-circle mr-3 avatar-md" style="width: 44px; height: 44px; object-fit: cover;">
          <div>
            <div class="d-flex align-items-center gap-2 mb-1">
              <span class="font-14 font-weight-bold">{{ meeting.parentName }}</span>
              <span class="font-11 text-muted">({{ meeting.studentName }} - {{ meeting.grade }})</span>
            </div>
            <p class="mb-1 font-13 font-weight-medium text-secondary-emphasis">{{ meeting.agenda }}</p>
            <span class="font-12 text-muted">
              <i class="far fa-clock mr-1"></i> {{ meeting.dateTime }}
            </span>
          </div>
        </div>
        <div class="text-right">
          <span class="badge rounded-pill font-11 px-2-5 py-1 mb-2 d-inline-block" [ngClass]="getPriorityBadgeClass(meeting.priority)">
            {{ meeting.priority }} Priority
          </span>
          <div class="text-muted font-11">
            <span class="font-weight-medium">Host:</span> {{ meeting.teacherName }}
          </div>
        </div>
      </div>
      }
    </div>
  </mat-card-content>
</mat-card>
