<mat-card class="modern-card h-100 border-radius-10 shadow-sm recent-submissions-widget">
  <mat-card-header class="header-style">
    <mat-card-title><mat-icon class="card-title-icon material-icons-outlined">upload_file</mat-icon> Recent Submissions</mat-card-title>
  </mat-card-header>

  <mat-card-content class="pt-2">
    <ng-scrollbar style="height: 430px;" visibility="hover">
      <div class="submissions-container pe-2">
        @for (s of submissions; track s; let i = $index) {
        <div class="submission-card d-flex align-items-stretch justify-content-between mb-3">

          <div class="card-accent-bg" [style.background-color]="s.color"></div>

          <div class="card-main-content d-flex flex-column justify-content-between flex-grow-1 py-1">

            <!-- Top: Avatar, Student Name, Status -->
            <div class="d-flex justify-content-between align-items-center mb-2">
              <div class="d-flex align-items-center gap-2">
                <div class="student-avatar d-flex align-items-center justify-content-center text-white font-11 fw-bold"
                  [style.background-color]="s.color">
                  {{ s.avatar }}
                </div>
                <div>
                  <h5 class="student-name mb-0">{{ s.name }}</h5>
                </div>
              </div>

              <span class="status-badge" [ngClass]="s.statusClass">
                @if (s.status === 'Pending') {
                <span class="pulse-dot"></span>
                }
                <span>{{ s.status === 'Graded' ? s.status + ' (' + s.grade + ')' : s.status }}</span>
              </span>
            </div>

            <!-- Middle: Assignment title -->
            <div class="mb-2 py-1">
              <p class="assignment-text mb-0">{{ s.assignment }}</p>
            </div>

            <!-- Bottom: Subject pill and date -->
            <div
              class="d-flex flex-wrap align-items-center justify-content-between gap-2 mt-2 pt-2 border-top border-dashed">
              <span class="meta-pill" [style.color]="s.color" [style.background]="s.color + '0a'">
                <mat-icon class="meta-icon">{{ s.icon }}</mat-icon>
                <span>{{ s.subject }}</span>
              </span>
              <span class="time-pill text-muted d-flex align-items-center">
                <mat-icon class="time-icon me-1">schedule</mat-icon>
                <span>{{ s.date }}</span>
              </span>
            </div>
          </div>

          <!-- Action panel -->
          <div class="card-actions-panel d-flex flex-column align-items-center justify-content-center gap-2 ps-3 ms-2">
            <button mat-icon-button class="action-btn text-primary" title="Grade">
              <mat-icon>grading</mat-icon>
            </button>
            <button mat-icon-button class="action-btn text-muted" title="Preview">
              <mat-icon>visibility</mat-icon>
            </button>
          </div>

        </div>
        }
      </div>
    </ng-scrollbar>
  </mat-card-content>
</mat-card>
